<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Storage Bridge</title></head>
<body>
<script>
  // This tiny page runs on the Caricature app's origin.
  // The GRBL controller embeds it as a hidden iframe and
  // uses postMessage to read the shared localStorage key.

  const STORAGE_KEY = 'swiftcanvas_gcode_history';

  window.addEventListener('message', (e) => {
    // Accept messages from any localhost origin (different ports)
    if (!e.origin.startsWith('http://localhost') && !e.origin.startsWith('http://127.0.0.1')) return;

    if (e.data && e.data.type === 'GET_HISTORY') {
      const raw = localStorage.getItem(STORAGE_KEY);
      e.source.postMessage({ type: 'HISTORY_DATA', data: raw }, e.origin);
    }
  });
</script>
</body>
</html>
